<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NERF BLASTERS: TARGET RUSH</title>
    <style>
        :root {
            --primary: #ff4500;
            --secondary: #00bfff;
            --accent: #ffd700;
            --bg-dark: #1a1a1a;
            --text-light: #ffffff;
            --font-main: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            color: var(--text-light);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            cursor: none; /* Custom crosshair */
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .overlay.active {
            display: flex;
        }

        h1 {
            font-size: clamp(2rem, 10vmin, 6rem);
            color: var(--primary);
            text-shadow: 0.5vmin 0.5vmin 0 var(--accent), 0 0 2vmin rgba(255, 69, 0, 0.5);
            margin-bottom: 2vmin;
            text-transform: uppercase;
            letter-spacing: 0.2vmin;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: clamp(10px, 2vmin, 20px) clamp(20px, 4vmin, 40px);
            font-size: clamp(1rem, 4vmin, 2rem);
            font-weight: bold;
            border-radius: 5vmin;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            margin: 1vmin;
            text-transform: uppercase;
            box-shadow: 0 1vmin 0 #b33000;
            width: 100%; /* Fill container */
            max-width: 40vmin;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1vmin;
            width: 90%;
            max-width: 80vmin;
            justify-items: center;
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .menu-grid {
                grid-template-columns: 1fr 1fr;
                max-width: 95vw;
            }
            h1 { font-size: 6vmin; margin-bottom: 1vmin; }
        }

        .btn:hover {
            transform: scale(1.05) translateY(-0.5vmin);
            background: #ff571a;
        }

        .btn:active {
            transform: scale(0.98) translateY(0.5vmin);
            box-shadow: 0 0.3vmin 0 #b33000;
        }

        .btn-secondary {
            background: var(--secondary);
            box-shadow: 0 1vmin 0 #008fbf;
        }

        .btn-secondary:hover {
            background: #1abeff;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2vmin;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            text-shadow: 0.3vmin 0.3vmin 0.6vmin rgba(0,0,0,0.8);
        }

        .hud-item {
            font-size: clamp(0.8rem, 3.5vmin, 2.5rem);
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 1vmin 2vmin;
            border-radius: 2vmin;
            border: 0.3vmin solid var(--secondary);
        }

        #combo-container {
            position: absolute;
            top: 10vmin;
            right: 2vmin;
            text-align: right;
            pointer-events: none;
        }

        .combo-text {
            font-size: clamp(1rem, 5vmin, 3rem);
            color: var(--accent);
            font-style: italic;
            text-transform: uppercase;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .combo-text.active {
            opacity: 1;
            transform: scale(1);
        }

        .combo-bar {
            width: 25vmin;
            height: 2vmin;
            background: rgba(255,255,255,0.2);
            border-radius: 1vmin;
            overflow: hidden;
            margin-top: 0.5vmin;
        }

        .combo-fill {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 0.1s linear;
        }
        /* Armory */
        #armory-screen {
            padding: 4vmin;
            overflow-y: auto;
        }

        .blaster-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vmin;
            margin-top: 2vmin;
            max-width: 90vmin;
        }

        .blaster-card {
            background: rgba(255,255,255,0.1);
            border: 0.4vmin solid #444;
            border-radius: 3vmin;
            padding: 2vmin;
            cursor: pointer;
            transition: all 0.2s;
        }

        .blaster-card.active {
            border-color: var(--accent);
            background: rgba(255,215,0,0.1);
        }

        .blaster-card.locked {
            opacity: 0.5;
            filter: grayscale(1);
        }

        .blaster-stats {
            font-size: 2.5vmin;
            margin-top: 1vmin;
        }
        /* Announcer */
        #announcer-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 12vmin;
            color: var(--accent);
            text-shadow: 0 0 3vmin rgba(255,215,0,0.8);
            pointer-events: none;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-weight: 900;
        }

        #announcer-text.active {
            transform: translate(-50%, -50%) scale(1);
        }

        /* Portrait Warning */
        #portrait-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff;
            justify-content: center; align-items: center;
            z-index: 9999; text-align: center; padding: 20px;
        }

        @media (orientation: portrait) {
            #portrait-warning { display: flex; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="portrait-warning"><h1>Please Rotate Your Device</h1><p>Landscape mode is recommended for the best experience!</p></div>
        <canvas id="gameCanvas"></canvas>
        <div id="announcer-text">COMBO!</div>
        
        <!-- HUD -->
        <div id="hud" style="display: none;">
            <div class="hud-item">SCORE: <span id="score-val">0</span></div>
            <div id="level-display" class="hud-item" style="color: var(--accent);">LEVEL 1</div>
            <div class="hud-item">TIME: <span id="time-val">60</span>s</div>
        </div>

        <div id="combo-container">
            <div id="combo-multiplier" class="combo-text">X1 COMBO</div>
            <div class="combo-bar"><div id="combo-fill" class="combo-fill"></div></div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="overlay active">
            <h1>Target Rush</h1>
            <div style="margin-bottom: 1vmin; font-size: 1.5rem; color: var(--accent);">TOKENS: <span id="token-count">0</span></div>
            <div class="menu-grid">
                <button class="btn" onclick="game.startArcade()">Play Arcade</button>
                <button class="btn btn-secondary" onclick="game.startEndless()">Endless Mode</button>
                <button class="btn btn-secondary" onclick="game.startProChallenge()">Pro Challenge</button>
                <button class="btn btn-secondary" onclick="game.startPassAndPlay()">2-Player Battle</button>
                <button class="btn btn-secondary" onclick="game.openArmory()">Blaster Armory</button>
                <button class="btn btn-secondary" onclick="game.openSettings()">Settings</button>
            </div>
            <button class="btn btn-secondary" id="fullscreen-btn" onclick="game.toggleFullscreen()" style="max-width: 60vmin; margin-top: 1vmin;">Go Fullscreen</button>
        </div>

        <!-- Settings Screen -->
        <div id="settings-screen" class="overlay">
            <h1>Settings</h1>
            <div style="font-size: 1.5rem; text-align: left; width: 300px;">
                <label><input type="checkbox" id="shake-toggle" checked> SCREEN SHAKE</label><br><br>
                <label><input type="checkbox" id="colorblind-toggle"> COLORBLIND MODE</label><br><br>
                <label><input type="checkbox" id="music-toggle" checked> MUSIC</label>
            </div>
            <button class="btn" onclick="game.goToMenu()" style="margin-top: 2rem;">Save & Back</button>
        </div>

        <!-- Armory Screen -->
        <div id="armory-screen" class="overlay">
            <h1>Blaster Armory</h1>
            <div class="blaster-grid" id="blaster-grid"></div>
            <button class="btn" onclick="game.goToMenu()" style="margin-top: 2rem;">Back</button>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="overlay" style="padding: 2vmin; overflow-y: auto;">
            <h1 id="results-title" style="margin-bottom: 1vmin; font-size: 6vmin;">Great Job!</h1>
            <div style="font-size: clamp(1rem, 3vmin, 2rem); margin-bottom: 1.5vmin; background: rgba(0,0,0,0.3); padding: 2vmin; border-radius: 2vmin; width: 80%;">
                <p id="player-label" style="color: var(--secondary); margin: 0.5vmin 0;"></p>
                <div style="display: flex; justify-content: space-around; gap: 2vmin;">
                    <p>Score: <span id="final-score" style="color: var(--accent);">0</span></p>
                    <p>Accuracy: <span id="final-accuracy" style="color: var(--accent);">0</span>%</p>
                </div>
                <div id="token-info" style="margin-top: 1vmin;">Tokens Earned: <span id="tokens-earned" style="color: var(--accent);">0</span></div>
            </div>
            <div id="level-buttons" style="display: flex; gap: 1vmin; flex-wrap: wrap; justify-content: center;">
                <button class="btn" id="next-level-btn" onclick="game.nextLevel()">Next Level</button>
                <button class="btn" id="pass-next-btn" onclick="game.startPassAndPlay(true)">Next Player</button>
            </div>
            <button class="btn btn-secondary" onclick="game.goToMenu()" style="margin-top: 1vmin;">Main Menu</button>
        </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('score-val');
        const timeVal = document.getElementById('time-val');
        const comboMultiplier = document.getElementById('combo-multiplier');
        const comboFill = document.getElementById('combo-fill');

        // Game Constants
        const CANVAS_WIDTH = 1920;
        const CANVAS_HEIGHT = 1080;
        const TARGET_FPS = 60;

        // Utilities
        const rand = (min, max) => Math.random() * (max - min) + min;
        const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

        class Game {
            constructor() {
                this.state = 'MENU';
                this.score = 0;
                this.timeRemaining = 60;
                this.lastTime = 0;
                this.targets = [];
                this.particles = [];
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.comboCount = 0;
                this.comboTimer = 0;
                this.comboMaxTime = 2000;
                this.currentLevel = 1;
                
                this.tokens = parseInt(localStorage.getItem('targetRush_tokens')) || 0;
                this.unlockedBlasters = JSON.parse(localStorage.getItem('targetRush_unlocks')) || ['elite'];
                
                this.blasters = [
                    { id: 'elite', name: 'Elite', fireRate: 333, special: 'None', cost: 0, color: '#00bfff' },
                    { id: 'rapid', name: 'Rapid Strike', fireRate: 150, special: 'Extreme SPD', cost: 500, color: '#ff4500' },
                    { id: 'mega', name: 'Mega Dart', fireRate: 600, special: 'Splash DMG', cost: 1000, color: '#ff0000' },
                    { id: 'triple', name: 'Triple Shot', fireRate: 500, special: '3-Way Burst', cost: 2000, color: '#ffd700' }
                ];
                
                this.currentBlaster = this.blasters.find(b => b.id === localStorage.getItem('targetRush_currentBlaster')) || this.blasters[0];
                this.lastShotTime = 0;

                this.levelData = [
                    { name: 'Backyard Blast', theme: 'backyard', duration: 30, spawnRate: 1200, minScore: 1000 },
                    { name: 'Arcade Arena', theme: 'arcade', duration: 40, spawnRate: 1000, minScore: 2500 },
                    { name: 'Construction Chaos', theme: 'construction', duration: 50, spawnRate: 800, minScore: 5000 },
                    { name: 'Space Station', theme: 'space', duration: 60, spawnRate: 600, minScore: 8000 },
                    { name: 'Ultimate Challenge', theme: 'jungle', duration: 60, spawnRate: 400, minScore: 12000 }
                ];

                this.setupCanvas();
                this.bindEvents();
                this.initAudio();
                this.updateTokenDisplay();
                this.loadSettings();
                this.loop();
            }

            loadSettings() {
                this.settings = JSON.parse(localStorage.getItem('targetRush_settings')) || {
                    shake: true,
                    colorblind: false,
                    music: true
                };
                document.getElementById('shake-toggle').checked = this.settings.shake;
                document.getElementById('colorblind-toggle').checked = this.settings.colorblind;
                document.getElementById('music-toggle').checked = this.settings.music;
            }

            saveSettings() {
                this.settings.shake = document.getElementById('shake-toggle').checked;
                this.settings.colorblind = document.getElementById('colorblind-toggle').checked;
                this.settings.music = document.getElementById('music-toggle').checked;
                localStorage.setItem('targetRush_settings', JSON.stringify(this.settings));
            }

            initAudio() {
                this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                this.musicLoop();
            }

            musicLoop() {
                const playBeat = () => {
                    if (this.state === 'PLAYING' && this.settings.music) {
                        const osc = this.audioCtx.createOscillator();
                        const gain = this.audioCtx.createGain();
                        osc.connect(gain); gain.connect(this.audioCtx.destination);
                        osc.frequency.setValueAtTime(60, this.audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.05, this.audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.2);
                        osc.start(); osc.stop(this.audioCtx.currentTime + 0.2);
                    }
                    setTimeout(playBeat, 500);
                };
                playBeat();
            }

            playSound(type) {
                if (!this.audioCtx) return;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.connect(gain);
                gain.connect(this.audioCtx.destination);

                const now = this.audioCtx.currentTime;

                if (type === 'shoot') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start();
                    osc.stop(now + 0.1);
                } else if (type === 'hit') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(200, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start();
                    osc.stop(now + 0.2);
                } else if (type === 'combo') {
                    osc.type = 'triangle';
                    const freq = 400 + (this.comboCount * 50);
                    osc.frequency.setValueAtTime(freq, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start();
                    osc.stop(now + 0.3);
                }
            }

            setupCanvas() {
                canvas.width = CANVAS_WIDTH;
                canvas.height = CANVAS_HEIGHT;
            }

            bindEvents() {
                const handleInput = (e) => {
                    if (this.state !== 'PLAYING') return;
                    
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    
                    const mouseX = (clientX - rect.left) * scaleX;
                    const mouseY = (clientY - rect.top) * scaleY;
                    this.mouseX = mouseX;
                    this.mouseY = mouseY;
                    
                    const now = Date.now();
                    if (now - this.lastShotTime > this.currentBlaster.fireRate) {
                        this.shoot(mouseX, mouseY);
                        this.lastShotTime = now;
                    }
                };

                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    this.mouseX = (e.clientX - rect.left) * scaleX;
                    this.mouseY = (e.clientY - rect.top) * scaleY;
                });

                canvas.addEventListener('mousedown', handleInput);
                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleInput(e);
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    this.mouseX = (e.touches[0].clientX - rect.left) * scaleX;
                    this.mouseY = (e.touches[0].clientY - rect.top) * scaleY;
                }, { passive: false });
            }

            toggleFullscreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.getElementById('fullscreen-btn').textContent = "Exit Fullscreen";
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                        document.getElementById('fullscreen-btn').textContent = "Go Fullscreen";
                    }
                }
            }

            shoot(x, y) {
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                this.playSound('shoot');
                this.shotsFired++;
                
                // Add Trail
                this.particles.push(new Trail(CANVAS_WIDTH/2, CANVAS_HEIGHT, x, y, this.currentBlaster.color));

                // Burst special
                if (this.currentBlaster.special === '3-Way Burst') {
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => this.attemptHit(x + rand(-40, 40), y + rand(-40, 40)), i * 50);
                    }
                    return;
                }

                this.attemptHit(x, y);
            }

            attemptHit(x, y) {
                let hit = false;
                for (let i = this.targets.length - 1; i >= 0; i--) {
                    const target = this.targets[i];
                    if (target.checkHit(x, y)) {
                        this.handleHit(target);
                        hit = true;
                        
                        // Splash special
                        if (this.currentBlaster.special === 'Splash DMG') {
                            this.targets.forEach(t => {
                                if (t !== target && dist(t.x, t.y, x, y) < 200) {
                                    this.handleHit(t);
                                }
                            });
                        }
                        break;
                    }
                }

                if (!hit) {
                    this.resetCombo();
                }
            }

            handleHit(target) {
                if (target.hit) return;
                target.hit = true;
                
                this.shotsHit++;
                this.comboCount++;
                this.comboTimer = this.comboMaxTime;
                
                this.playSound('hit');
                if (this.comboCount % 5 === 0) this.playSound('combo');
                
                if (this.settings.shake) this.shake = 10;

                const points = target.points * this.getMultiplier();
                this.score += points;
                
                // Remove target
                this.targets = this.targets.filter(t => t !== target);
                
                // Trigger effects
                this.createConfetti(target.x, target.y, target.color);
                
                this.updateUI();
                
                if (this.comboCount === 5) this.announce("MEGA!");
                if (this.comboCount === 10) this.announce("ULTRA!");
                if (this.comboCount === 15) this.announce("UNSTOPPABLE!");
                if (this.comboCount === 20) this.announce("GODLIKE!");
            }

            announce(text) {
                const el = document.getElementById('announcer-text');
                el.textContent = text;
                el.classList.add('active');
                setTimeout(() => el.classList.remove('active'), 1000);
            }

            getMultiplier() {
                if (this.comboCount < 3) return 1;
                if (this.comboCount < 6) return 2;
                if (this.comboCount < 10) return 3;
                if (this.comboCount < 15) return 4;
                return 5;
            }

            resetCombo() {
                this.comboCount = 0;
                this.comboTimer = 0;
                this.updateUI();
            }

            updateUI() {
                scoreVal.textContent = Math.floor(this.score);
                timeVal.textContent = Math.ceil(this.timeRemaining);
                
                const mult = this.getMultiplier();
                if (this.comboCount > 1) {
                    comboMultiplier.textContent = `X${mult} COMBO`;
                    comboMultiplier.classList.add('active');
                    comboFill.parentElement.style.opacity = '1';
                } else {
                    comboMultiplier.classList.remove('active');
                    comboFill.parentElement.style.opacity = '0';
                }
            }

            createConfetti(x, y, color) {
                for (let i = 0; i < 20; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }

            startArcade(levelIndex = 0) {
                this.currentLevel = levelIndex;
                const level = this.levelData[this.currentLevel];
                this.state = 'PLAYING';
                this.score = 0;
                this.timeRemaining = level.duration;
                this.targets = [];
                this.particles = [];
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.resetCombo();
                
                document.getElementById('main-menu').classList.remove('active');
                document.getElementById('results-screen').classList.remove('active');
                document.getElementById('hud').style.display = 'flex';
                document.getElementById('level-display').textContent = level.name.toUpperCase();
                
                this.isProMode = false; // Reset by default
                this.spawnLevel();
            }

            spawnLevel() {
                if (this.spawnInterval) clearInterval(this.spawnInterval);
                const level = this.levelData[this.currentLevel];
                this.spawnInterval = setInterval(() => {
                    if (this.state === 'PLAYING') {
                        this.spawnTarget();
                    } else {
                        clearInterval(this.spawnInterval);
                    }
                }, level.spawnRate);
            }

            spawnTarget() {
                const margin = 150;
                const x = rand(margin, CANVAS_WIDTH - margin);
                const y = rand(margin, CANVAS_HEIGHT - margin);
                
                // Probabilities based on current level
                const p = Math.random();
                let target;

                if (this.currentLevel === 0 && !this.isProMode) {
                    target = new BullseyeTarget(x, y);
                } else if (this.currentLevel === 1 && !this.isProMode) {
                    target = p < 0.7 ? new BullseyeTarget(x, y) : new PopUpTarget(x, y);
                } else if (this.currentLevel === 2 && !this.isProMode) {
                    if (p < 0.4) target = new BullseyeTarget(x, y);
                    else if (p < 0.7) target = new PopUpTarget(x, y);
                    else target = new SwingingTarget(x, y);
                } else if (this.currentLevel === 3 && !this.isProMode) {
                    if (p < 0.3) target = new BullseyeTarget(x, y);
                    else if (p < 0.5) target = new BouncingTarget(x, y);
                    else if (p < 0.8) target = new DroneTarget(x, y);
                    else target = new SwingingTarget(x, y);
                } else {
                    // Level 4 or Pro Mode
                    if (p < 0.2) target = new BullseyeTarget(x, y);
                    else if (p < 0.4) target = new MovingWallTarget(x, y);
                    else if (p < 0.6) target = new DroneTarget(x, y);
                    else if (p < 0.8) target = new BouncingTarget(x, y);
                    else target = new PopUpTarget(x, y);
                }

                if (this.isProMode) {
                    target.radius *= 0.7; // Smaller targets
                    target.points *= 2;    // Double points
                    target.lifeTime *= 0.6; // Faster expiry
                }

                // Chance for Golden Target
                if (Math.random() < 0.05) {
                    const gt = new GoldenTarget(rand(margin, CANVAS_WIDTH-margin), rand(margin, CANVAS_HEIGHT-margin));
                    if (this.isProMode) gt.radius *= 0.7;
                    this.targets.push(gt);
                }

                this.targets.push(target);
            }

            drawBackground() {
                const theme = this.levelData[this.currentLevel]?.theme || 'default';
                const w = CANVAS_WIDTH;
                const h = CANVAS_HEIGHT;

                if (theme === 'backyard') {
                    ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, w, h); // Sky
                    ctx.fillStyle = '#2d5a27'; ctx.fillRect(0, h * 0.7, w, h * 0.3); // Grass
                    ctx.fillStyle = '#ddd'; 
                    for(let i=0; i<w; i+=100) ctx.fillRect(i, h*0.65, 80, h*0.1); // Fence
                } else if (theme === 'arcade') {
                    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
                    ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2;
                    for(let i=0; i<w; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
                    for(let i=0; i<h; i+=50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
                } else if (theme === 'construction') {
                    ctx.fillStyle = '#555'; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#f39c12'; ctx.fillRect(0, h-50, w, 50); // Warning stripes
                    ctx.fillStyle = '#e67e22'; for(let i=0; i<w; i+=400) ctx.fillRect(i, h-200, 200, 200); // Beams
                } else if (theme === 'space') {
                    ctx.fillStyle = '#0a0a2a'; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#fff';
                    for(let i=0; i<100; i++) ctx.fillRect(Math.random()*w, Math.random()*h, 2, 2);
                } else if (theme === 'jungle') {
                    ctx.fillStyle = '#063b00'; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = '#8b4513'; for(let i=0; i<w; i+=300) ctx.fillRect(i, 0, 40, h); // Vines
                } else {
                    const grad = ctx.createRadialGradient(w/2, h/2, 100, w/2, h/2, 800);
                    grad.addColorStop(0, '#34495e'); grad.addColorStop(1, '#000000');
                    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
                }
            }

            goToMenu() {
                this.saveSettings();
                this.state = 'MENU';
                document.getElementById('results-screen').classList.remove('active');
                document.getElementById('settings-screen').classList.remove('active');
                document.getElementById('armory-screen').classList.remove('active');
                document.getElementById('main-menu').classList.add('active');
            }

            openSettings() {
                this.state = 'SETTINGS';
                document.getElementById('main-menu').classList.remove('active');
                document.getElementById('settings-screen').classList.add('active');
            }

            endGame() {
                this.state = 'RESULTS';
                document.getElementById('hud').style.display = 'none';
                document.getElementById('results-screen').classList.add('active');
                
                const accuracy = this.shotsFired > 0 ? Math.round((this.shotsHit / this.shotsFired) * 100) : 0;
                const level = this.levelData[this.currentLevel];
                const passed = this.score >= level.minScore;
                
                let tokensEarned = Math.floor(this.score / 10);
                if (passed) tokensEarned += 200;
                this.tokens += tokensEarned;
                localStorage.setItem('targetRush_tokens', this.tokens);
                this.updateTokenDisplay();

                document.getElementById('results-title').textContent = passed ? "Level Complete!" : "Try Again!";
                if (this.gameMode === 'PASS_PLAY') {
                    document.getElementById('results-title').textContent = "Round Complete!";
                    document.getElementById('pass-next-btn').style.display = this.p2Turn ? 'none' : 'block';
                    document.getElementById('player-label').textContent = this.p2Turn ? `PLAYER 2 SCORE: ${this.score}` : `PLAYER 1 SCORE: ${this.score}`;
                    if (!this.p2Turn) this.p1Score = this.score;
                    else {
                         const winner = this.score > this.p1Score ? "PLAYER 2 WINS!" : this.p1Score > this.score ? "PLAYER 1 WINS!" : "IT'S A DRAW!";
                         document.getElementById('results-title').textContent = winner;
                    }
                }
                
                document.getElementById('results-title').style.color = passed ? "var(--secondary)" : "var(--primary)";
                document.getElementById('final-score').textContent = Math.floor(this.score);
                document.getElementById('final-accuracy').textContent = accuracy;
                document.getElementById('tokens-earned').textContent = tokensEarned;
                document.getElementById('token-info').style.display = (this.gameMode === 'ARCADE' || this.gameMode === 'ENDLESS') ? 'block' : 'none';
                document.getElementById('next-level-btn').style.display = (this.gameMode === 'ARCADE' && passed && this.currentLevel < this.levelData.length - 1) ? 'block' : 'none';
            }

            startEndless() {
                this.gameMode = 'ENDLESS';
                this.startArcade(0);
                this.timeRemaining = 999; 
                document.getElementById('level-display').textContent = "ENDLESS MODE";
                // Ramping up spawnRate
                let rate = 1200;
                this.endlessInterval = setInterval(() => {
                    if (this.state === 'PLAYING') {
                        rate = Math.max(200, rate - 50);
                        this.spawnLevel(rate);
                    } else clearInterval(this.endlessInterval);
                }, 5000);
            }

            spawnLevel(customRate) {
                if (this.spawnInterval) clearInterval(this.spawnInterval);
                const level = this.levelData[this.currentLevel];
                let rate = customRate || level.spawnRate;
                if (this.isProMode) rate *= 0.5; // 2x faster
                this.spawnInterval = setInterval(() => {
                    if (this.state === 'PLAYING') {
                        this.spawnTarget();
                    } else {
                        clearInterval(this.spawnInterval);
                    }
                }, rate);
            }

            startPassAndPlay(isP2 = false) {
                this.gameMode = 'PASS_PLAY';
                this.p2Turn = isP2;
                this.startArcade(0);
                document.getElementById('level-display').textContent = isP2 ? "PLAYER 2 TURN" : "PLAYER 1 TURN";
                document.getElementById('player-label').textContent = "";
            }

            startProChallenge() {
                this.gameMode = 'PRO';
                this.startArcade(4); // Start on the final level
                this.timeRemaining = 60;
                document.getElementById('level-display').textContent = "PRO CHALLENGE";
                // Modifiers for Pro mode
                this.isProMode = true;
            }

            update(dt) {
                if (isNaN(dt)) dt = 16.6;
                if (this.state === 'PLAYING') {
                    this.timeRemaining -= dt / 1000;
                    if (this.timeRemaining <= 0) {
                        this.endGame();
                    }

                    if (this.comboTimer > 0) {
                        this.comboTimer -= dt;
                        comboFill.style.width = `${(this.comboTimer / this.comboMaxTime) * 100}%`;
                        if (this.comboTimer <= 0) {
                            this.resetCombo();
                        }
                    }

                    this.targets.forEach(t => t.update(dt));
                    this.targets = this.targets.filter(t => !t.expired);
                }

                this.particles.forEach(p => p.update(dt));
                this.particles = this.particles.filter(p => !p.dead);
            }

            draw() {
                ctx.save();
                if (this.shake > 0) {
                    ctx.translate(Math.random() * this.shake, Math.random() * this.shake);
                    this.shake *= 0.9;
                }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                this.drawBackground();
                this.targets.forEach(t => t.draw(ctx));
                this.particles.forEach(p => p.draw(ctx));
                if (this.state === 'PLAYING') this.drawCrosshair();
                ctx.restore();
            }

            drawCrosshair() {
                const x = this.mouseX || CANVAS_WIDTH/2;
                const y = this.mouseY || CANVAS_HEIGHT/2;
                ctx.save();
                ctx.translate(x, y);
                ctx.strokeStyle = this.currentBlaster.color;
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(-15, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(40, 0); ctx.lineTo(15, 0); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 40); ctx.lineTo(0, 15); ctx.stroke();
                ctx.restore();
            }

            updateTokenDisplay() {
                document.getElementById('token-count').textContent = this.tokens;
            }

            nextLevel() {
                this.startArcade(this.currentLevel + 1);
            }

            openArmory() {
                this.state = 'ARMORY';
                document.getElementById('main-menu').classList.remove('active');
                document.getElementById('armory-screen').classList.add('active');
                this.renderArmory();
            }

            renderArmory() {
                const grid = document.getElementById('blaster-grid');
                grid.innerHTML = '';
                this.blasters.forEach(b => {
                    const unlocked = this.unlockedBlasters.includes(b.id);
                    const active = this.currentBlaster.id === b.id;
                    const card = document.createElement('div');
                    card.className = `blaster-card ${!unlocked ? 'locked' : ''} ${active ? 'active' : ''}`;
                    card.innerHTML = `
                        <h3 style="color:${b.color}">${b.name}</h3>
                        <p>${b.special}</p>
                        <div class="blaster-stats">Fire Rate: ${Math.round(1000/b.fireRate)}/s</div>
                        ${!unlocked ? `<button class="btn btn-secondary" style="font-size:1rem; padding:0.5rem 1rem;" onclick="game.buyBlaster('${b.id}', ${b.cost})">BUY: ${b.cost}</button>` : active ? '<span>EQUIPPED</span>' : `<button class="btn" style="font-size:1rem; padding:0.5rem 1rem;" onclick="game.equipBlaster('${b.id}')">EQUIP</button>`}
                    `;
                    grid.appendChild(card);
                });
            }

            buyBlaster(id, cost) {
                if (this.tokens >= cost) {
                    this.tokens -= cost;
                    this.unlockedBlasters.push(id);
                    localStorage.setItem('targetRush_tokens', this.tokens);
                    localStorage.setItem('targetRush_unlocks', JSON.stringify(this.unlockedBlasters));
                    this.updateTokenDisplay();
                    this.renderArmory();
                } else {
                    alert("Not enough tokens!");
                }
            }

            equipBlaster(id) {
                this.currentBlaster = this.blasters.find(b => b.id === id);
                localStorage.setItem('targetRush_currentBlaster', id);
                this.renderArmory();
            }

            startPractice() {
                this.gameMode = 'ARCADE';
                this.startArcade(0);
                this.timeRemaining = 9999;
                document.getElementById('level-display').textContent = "PRACTICE RANGE";
            }

            loop(timestamp = 0) {
                const dt = timestamp - this.lastTime;
                this.lastTime = timestamp;

                this.update(dt);
                this.draw();

                requestAnimationFrame((t) => this.loop(t));
            }
        }

        class Target {
            constructor(x, y, radius, points, color) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.points = points;
                this.color = color;
                this.expired = false;
                this.lifeTime = 3000;
                this.timer = 0;
                this.scale = 0; // For pop-up animation
            }

            update(dt) {
                this.timer += dt;
                if (this.timer < 300) {
                    this.scale = this.timer / 300;
                } else if (this.timer > this.lifeTime - 300) {
                    this.scale = (this.lifeTime - this.timer) / 300;
                    if (this.scale <= 0) this.expired = true;
                } else {
                    this.scale = 1;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);
                this.render(ctx);
                ctx.restore();
            }

            render(ctx) {
                // Implemented by subclasses
            }

            checkHit(mx, my) {
                return dist(mx, my, this.x, this.y) < this.radius;
            }
        }

        class BullseyeTarget extends Target {
            constructor(x, y) {
                super(x, y, 60, 100, '#ff4500');
            }

            render(ctx) {
                const color = game.settings.colorblind ? '#fff' : this.color;
                // Main Face
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'white'; ctx.fill();
                ctx.lineWidth = 5; ctx.strokeStyle = color; ctx.stroke();
                
                // Eyes
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(-15, -10, 8, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(15, -10, 8, 0, Math.PI * 2); ctx.fill();
                
                // Smile
                ctx.beginPath(); ctx.arc(0, 10, 20, 0.2 * Math.PI, 0.8 * Math.PI);
                ctx.lineWidth = 4; ctx.strokeStyle = color; ctx.stroke();
            }
        }

        class PopUpTarget extends Target {
            constructor(x, y) {
                super(x, y, 50, 150, '#ff4500');
                this.lifeTime = 2000;
            }
            render(ctx) {
                ctx.fillStyle = '#333'; ctx.fillRect(-40, 20, 80, 20); // Base
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4500'; ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
                
                // Contented Face
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(-12, -8, 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(12, -8, 6, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(0, 10, 15, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
            }
        }

        class SwingingTarget extends Target {
            constructor(x, y) {
                super(x, y, 55, 200, '#00bfff');
                this.lifeTime = 5000;
                this.offset = Math.random() * Math.PI * 2;
                this.startY = -200;
            }
            update(dt) {
                super.update(dt);
                this.x += Math.sin(Date.now() / 500 + this.offset) * 5;
            }
            render(ctx) {
                ctx.strokeStyle = '#666'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(0, this.startY); ctx.lineTo(0, 0); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00bfff'; ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
            }
        }

        class BouncingTarget extends Target {
            constructor(x, y) {
                super(x, y, 45, 250, '#ffd700');
                this.vx = rand(-5, 5);
                this.vy = rand(-5, 5);
                this.lifeTime = 6000;
            }
            update(dt) {
                super.update(dt);
                this.x += this.vx; this.y += this.vy;
                if (this.x < 100 || this.x > CANVAS_WIDTH - 100) this.vx *= -1;
                if (this.y < 100 || this.y > CANVAS_HEIGHT - 100) this.vy *= -1;
            }
            render(ctx) {
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd700'; ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
            }
        }

        class MovingWallTarget extends Target {
            constructor(x, y) {
                super(x, rand(200, CANVAS_HEIGHT - 200), 80, 350, '#ff00ff');
                this.vx = (Math.random() < 0.5 ? 1 : -1) * 4;
                this.lifeTime = 8000;
            }
            update(dt) {
                super.update(dt);
                this.x += this.vx;
                if (this.x < -100) this.x = CANVAS_WIDTH + 100;
                if (this.x > CANVAS_WIDTH + 100) this.x = -100;
            }
            render(ctx) {
                ctx.fillStyle = '#ff00ff'; ctx.fillRect(-60, -80, 120, 160);
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.strokeRect(-60, -80, 120, 160);
            }
        }

        class DroneTarget extends Target {
            constructor(x, y) {
                super(x, y, 40, 300, '#00ff00');
                this.lifeTime = 7000;
                this.angle = 0;
            }
            update(dt) {
                super.update(dt);
                this.angle += 0.05;
                this.x += Math.cos(this.angle) * 10;
                this.y += Math.sin(this.angle * 2) * 5;
            }
            render(ctx) {
                ctx.fillStyle = '#222'; ctx.fillRect(-30, -5, 60, 10);
                ctx.fillRect(-5, -30, 10, 60);
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00ff00'; ctx.fill();
            }
        }

        class GoldenTarget extends Target {
            constructor(x, y) {
                super(x, y, 35, 500, '#ffff00');
                this.lifeTime = 1500;
                this.vx = rand(-8, 8); this.vy = rand(-8, 8);
            }
            update(dt) {
                super.update(dt);
                this.x += this.vx; this.y += this.vy;
            }
            render(ctx) {
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                const g = ctx.createRadialGradient(0,0,0,0,0,this.radius);
                g.addColorStop(0, '#fff'); g.addColorStop(1, '#ffd700');
                ctx.fillStyle = g; ctx.fill();
                ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = rand(-8, 8); this.vy = rand(-12, 4);
                this.gravity = 0.4; this.color = color;
                this.life = 1.0; this.decay = rand(0.015, 0.03);
                this.size = rand(6, 12);
            }
            update(dt) {
                this.x += this.vx; this.y += this.vy; this.vy += this.gravity;
                this.life -= this.decay; if (this.life <= 0) this.dead = true;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life; ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }

        class Trail {
            constructor(x1, y1, x2, y2, color) {
                this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
                this.color = color; this.life = 1.0; this.dead = false;
            }
            update(dt) {
                this.life -= 0.05; if (this.life <= 0) this.dead = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life; ctx.strokeStyle = this.color;
                ctx.lineWidth = 10 * this.life; ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
                ctx.restore();
            }
        }

        const game = new Game();
    </script>
